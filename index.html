
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manhwa Release Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .time-box { background: linear-gradient(145deg, #1e293b, #0f172a); box-shadow: inset 0 2px 4px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); }
        .loader { border: 4px solid rgba(255,255,255,0.1); border-left-color: #38bdf8; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hover-card { transition: transform 0.2s ease, box-shadow 0.2s ease; cursor: pointer; }
        .hover-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.4); border-color: rgba(56, 189, 248, 0.4); }
        .text-glow { text-shadow: 0 0 15px rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 sm:p-8">

    <header class="w-full max-w-5xl flex justify-between items-center py-4 border-b border-slate-700 mb-8">
        <a href="?" class="text-2xl font-bold tracking-wider text-amber-400 hover:opacity-80 transition">Manhwa<span class="text-white">Track</span></a>
        <a href="?" id="back-btn" class="hidden text-sm font-semibold text-slate-400 hover:text-white transition flex items-center gap-2 bg-slate-800 px-4 py-2 rounded-lg">
            ← Back to Home
        </a>
    </header>

    <div id="loading-spinner" class="flex flex-col items-center justify-center mt-20">
        <div class="loader mb-4"></div>
        <p class="text-slate-400 font-semibold tracking-widest uppercase text-sm mt-2">Fetching data...</p>
    </div>

    <div id="error-message" class="hidden flex flex-col items-center justify-center mt-10 text-center">
        <p class="text-red-400 font-bold text-lg mb-2">Could not load data.</p>
        <p class="text-slate-400 text-sm max-w-md">Please ensure the Google Sheet link is correct and publicly accessible.</p>
    </div>

    <main id="home-view" class="w-full max-w-5xl flex flex-col gap-6 hidden"></main>
    <main id="detail-view" class="w-full max-w-5xl hidden flex-col items-center"></main>

    <script>
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/14hAx619Oj8RftJaoNNYKcVKpwe7BaNe35JGrvFhKW60/export?format=csv";
        
        let globalTimerInterval;
        const urlParams = new URLSearchParams(window.location.search);
        const activeManhwaId = urlParams.get('id');

        function loadData() {
            Papa.parse(SHEET_CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) { 
                    if (results.data && results.data.length > 0 && results.data[0].id) {
                        routePage(results.data); 
                    } else {
                        showError();
                    }
                },
                error: function(err) { 
                    console.error("Failed to fetch or parse CSV:", err);
                    showError(); 
                }
            });
        }

        function showError() {
            document.getElementById("loading-spinner").style.display = "none";
            document.getElementById("error-message").classList.remove("hidden");
        }

        function routePage(allManhwaData) {
            document.getElementById("loading-spinner").style.display = "none";

            if (activeManhwaId) {
                const specificManhwa = allManhwaData.find(m => m.id === activeManhwaId);
                if (specificManhwa) {
                    document.getElementById("back-btn").classList.remove("hidden");
                    buildDetailPage(specificManhwa);
                } else {
                    window.location.href = "?";
                }
            } else {
                buildHomePage(allManhwaData);
            }
        }

        // --- HOME PAGE BUILDER ---
        function buildHomePage(manhwaData) {
            const container = document.getElementById("home-view");
            container.classList.remove("hidden");
            container.classList.add("grid", "grid-cols-1", "md:grid-cols-2", "gap-6");

            manhwaData.forEach(manhwa => {
                if (!manhwa.id || !manhwa.title) return;
                
                const isHiatus = manhwa.Activitycountdown && (manhwa.Activitycountdown.toLowerCase() === "hiatus" || manhwa.Activitycountdown.toLowerCase() === "paused");

                const cardHTML = `
                    <div onclick="window.location.href='?id=${manhwa.id}'" class="glass-card hover-card rounded-2xl p-4 flex gap-4 items-center relative overflow-hidden">
                        ${isHiatus ? `<div class="absolute top-0 right-0 bg-red-500/90 text-white text-[10px] font-bold px-8 py-1 transform translate-x-6 translate-y-3 rotate-45 shadow-lg z-10 uppercase">HIATUS</div>` : ''}

                        <div class="w-24 h-36 flex-shrink-0 rounded-lg overflow-hidden border border-slate-700 bg-slate-800">
                            <img src="${manhwa.image || 'https://via.placeholder.com/400x600/1e293b/38bdf8?text=No+Cover'}" class="w-full h-full object-cover ${isHiatus ? 'opacity-40 grayscale' : ''}">
                        </div>
                        
                        <div class="flex-1 flex flex-col justify-center">
                            <h2 class="text-xl font-bold mb-1 line-clamp-2 leading-tight">${manhwa.title}</h2>
                            <p class="text-xs text-slate-400 mb-4">Click to view full schedule ➔</p>
                            
                            <div class="flex flex-col gap-1.5">
                                ${manhwa.KRnewchapter ? `<p class="text-base text-amber-400 font-bold tracking-wide">🇰🇷 ${manhwa.KRnewchapter}</p>` : ''}
                                ${manhwa.ENnewchapter ? `<p class="text-base text-blue-400 font-bold tracking-wide">🇬🇧 ${manhwa.ENnewchapter}</p>` : ''}
                                ${!manhwa.KRnewchapter && !manhwa.ENnewchapter ? '<p class="text-slate-500 text-sm">No chapters scheduled</p>' : ''}
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // --- DETAIL PAGE BUILDER ---
        function buildDetailPage(manhwa) {
            const container = document.getElementById("detail-view");
            container.classList.remove("hidden");
            
            const isHiatus = manhwa.Activitycountdown && (manhwa.Activitycountdown.toLowerCase() === "hiatus" || manhwa.Activitycountdown.toLowerCase() === "paused");
            
            const hasKR = manhwa.KRreleasedate && manhwa.KRreleasedate.trim() !== "" && manhwa.KRnewchapter;
            const hasEN = manhwa.ENreleaseDate && manhwa.ENreleaseDate.trim() !== "" && manhwa.ENnewchapter;

            const html = `
                <div class="glass-card w-full rounded-3xl p-6 sm:p-10 shadow-2xl relative overflow-hidden flex flex-col items-center text-center border-t-4 border-t-amber-400">
                    ${isHiatus ? `<div class="w-full bg-red-500/20 border border-red-500/50 text-red-400 font-bold py-3 px-4 rounded-xl mb-8 flex justify-center items-center gap-2"><span class="text-xl">⏸️</span> This series is currently on hiatus. Timers are paused.</div>` : ''}

                    <div class="w-48 h-72 sm:w-64 sm:h-96 rounded-2xl overflow-hidden shadow-2xl border-4 border-slate-700 bg-slate-800 mb-8 relative">
                        <img src="${manhwa.image || 'https://via.placeholder.com/400x600/1e293b/38bdf8?text=No+Cover'}" class="w-full h-full object-cover ${isHiatus ? 'opacity-40 grayscale' : ''}">
                    </div>

                    <h1 class="text-4xl sm:text-5xl font-extrabold mb-4">${manhwa.title}</h1>
                    ${manhwa.Notes ? `<p class="text-base text-slate-400 italic max-w-2xl bg-slate-800/50 px-6 py-3 rounded-xl mb-10">${manhwa.Notes}</p>` : '<div class="mb-8"></div>'}

                    <div class="w-full max-w-4xl flex flex-col md:flex-row gap-6 justify-center">
                        ${hasKR ? generateBigTimerBlock(manhwa.id, 'kr', manhwa.KRnewchapter, 'text-amber-400', isHiatus) : ''}
                        ${hasEN ? generateBigTimerBlock(manhwa.id, 'en', manhwa.ENnewchapter, 'text-blue-400', isHiatus) : ''}
                        ${!hasKR && !hasEN ? '<p class="text-slate-500 text-lg">No release dates scheduled for this series right now.</p>' : ''}
                    </div>
                </div>
            `;
            container.innerHTML = html;
            
            if (!isHiatus && (hasKR || hasEN)) {
                startTimers([manhwa]);
            }
        }

        // GENERATE THE HUGE CHAPTER TEXT
        function generateBigTimerBlock(manhwaId, langType, chapterText, colorClass, isHiatus) {
            return `
                <div class="flex-1 bg-slate-800 p-6 sm:p-8 rounded-3xl border border-slate-700 shadow-xl flex flex-col items-center">
                    
                    <!-- NEW EMPHASIZED CHAPTER DISPLAY -->
                    <div id="${manhwaId}-${langType}-chapter-container" class="mb-8 w-full">
                        <span class="${colorClass} text-sm sm:text-base font-bold uppercase tracking-widest block mb-2">
                            ${langType === 'en' ? '🇬🇧 English Release' : '🇰🇷 Korean Raw'}
                        </span>
                        <span class="text-white text-4xl sm:text-5xl font-black block text-glow">
                            ${chapterText}
                        </span>
                    </div>
                    
                    ${isHiatus ? '<p class="text-slate-500 italic mt-4">Timer Paused</p>' : `
                    <div id="${manhwaId}-${langType}-timer" class="flex gap-2 sm:gap-4 w-full justify-center">
                        <div class="time-box flex flex-col items-center justify-center w-14 h-16 sm:w-20 sm:h-24 rounded-xl">
                            <span id="${manhwaId}-${langType}-days" class="text-2xl sm:text-4xl font-black text-white">00</span>
                            <span class="text-[9px] sm:text-xs text-slate-400 font-semibold uppercase mt-1 sm:mt-2">Days</span>
                        </div>
                        <div class="time-box flex flex-col items-center justify-center w-14 h-16 sm:w-20 sm:h-24 rounded-xl">
                            <span id="${manhwaId}-${langType}-hours" class="text-2xl sm:text-4xl font-black text-white">00</span>
                            <span class="text-[9px] sm:text-xs text-slate-400 font-semibold uppercase mt-1 sm:mt-2">Hours</span>
                        </div>
                        <div class="time-box flex flex-col items-center justify-center w-14 h-16 sm:w-20 sm:h-24 rounded-xl">
                            <span id="${manhwaId}-${langType}-minutes" class="text-2xl sm:text-4xl font-black text-white">00</span>
                            <span class="text-[9px] sm:text-xs text-slate-400 font-semibold uppercase mt-1 sm:mt-2">Mins</span>
                        </div>
                        <div class="time-box flex flex-col items-center justify-center w-14 h-16 sm:w-20 sm:h-24 rounded-xl ${langType === 'kr' ? 'text-amber-400' : 'text-blue-400'}">
                            <span id="${manhwaId}-${langType}-seconds" class="text-2xl sm:text-4xl font-black">00</span>
                            <span class="text-[9px] sm:text-xs opacity-70 font-semibold uppercase mt-1 sm:mt-2">Secs</span>
                        </div>
                    </div>

                    <div id="${manhwaId}-${langType}-status" class="hidden mt-6 text-green-400 font-bold text-lg sm:text-xl bg-green-500/20 px-4 sm:px-6 py-3 rounded-xl border border-green-500/30 w-full text-center shadow-[0_0_15px_rgba(34,197,94,0.2)]">
                        ✓ Chapter is out now!
                    </div>
                    `}
                </div>
            `;
        }

        // --- TIMER ENGINE ---
        function autoIncrementChapter(chapterString, intervalsPassed) {
            if (!chapterString) return chapterString;
            let currentNumber = parseInt(chapterString.replace(/[^0-9]/g, ''));
            if (!isNaN(currentNumber)) {
                let newNumber = currentNumber + intervalsPassed;
                return chapterString.replace(currentNumber.toString(), newNumber.toString());
            }
            return chapterString;
        }

        // CUSTOM DATE PARSER: Converts "25/6/2026 14:00:00"
        function parseCustomDate(dateString) {
            try {
                const parts = dateString.trim().split(" ");
                if (parts.length < 2) return NaN;

                const dateParts = parts[0].split("/");
                if (dateParts.length !== 3) return NaN;
                
                const day = parseInt(dateParts[0], 10);
                const month = parseInt(dateParts[1], 10) - 1; 
                const year = parseInt(dateParts[2], 10);

                const timeParts = parts[1].split(":");
                const hours = parseInt(timeParts[0], 10) || 0;
                const minutes = parseInt(timeParts[1], 10) || 0;
                const seconds = parseInt(timeParts[2], 10) || 0;

                return new Date(year, month, day, hours, minutes, seconds).getTime();
            } catch (e) {
                return NaN;
            }
        }

        function processIndividualTimer(manhwa, langType, dateCol, chapCol) {
            const dateString = manhwa[dateCol];
            const chapString = manhwa[chapCol];

            if (!dateString || dateString.trim() === "" || !chapString) return;

            let releaseTime = parseCustomDate(dateString);
            
            if (isNaN(releaseTime)) {
                return; 
            }

            let now = new Date().getTime();
            let distance = releaseTime - now;

            // Auto-increment logic
            if (distance < 0 && manhwa.IntervalDays && parseInt(manhwa.IntervalDays) > 0) {
                const intervalMs = parseInt(manhwa.IntervalDays) * 24 * 60 * 60 * 1000;
                const intervalsPassed = Math.floor(Math.abs(distance) / intervalMs) + 1;
                
                releaseTime = releaseTime + (intervalMs * intervalsPassed);
                distance = releaseTime - now;

                if (chapString) {
                    const prefix = langType === 'en' ? '🇬🇧 English Release' : '🇰🇷 Korean Raw';
                    const colorClass = langType === 'en' ? 'text-blue-400' : 'text-amber-400';
                    const elementContainer = document.getElementById(`${manhwa.id}-${langType}-chapter-container`);
                    
                    if(elementContainer) {
                        elementContainer.innerHTML = `
                            <span class="${colorClass} text-sm sm:text-base font-bold uppercase tracking-widest block mb-2">
                                ${prefix}
                            </span>
                            <span class="text-white text-4xl sm:text-5xl font-black block text-glow">
                                ${autoIncrementChapter(chapString, intervalsPassed)}
                            </span>
                        `;
                    }
                }
            }

            // UI Update Logic
            const timerContainer = document.getElementById(`${manhwa.id}-${langType}-timer`);
            const statusContainer = document.getElementById(`${manhwa.id}-${langType}-status`);
            
            if (!timerContainer || !statusContainer) return; 

            if (distance < 0 || isNaN(distance)) {
                timerContainer.style.display = "none";
                statusContainer.style.display = "block";
            } else {
                timerContainer.style.display = "flex";
                statusContainer.style.display = "none";

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById(`${manhwa.id}-${langType}-days`).innerText = days.toString().padStart(2, '0');
                document.getElementById(`${manhwa.id}-${langType}-hours`).innerText = hours.toString().padStart(2, '0');
                document.getElementById(`${manhwa.id}-${langType}-minutes`).innerText = minutes.toString().padStart(2, '0');
                document.getElementById(`${manhwa.id}-${langType}-seconds`).innerText = seconds.toString().padStart(2, '0');
            }
        }

        function startTimers(manhwaData) {
            if(globalTimerInterval) clearInterval(globalTimerInterval);
            
            globalTimerInterval = setInterval(function() {
                manhwaData.forEach(manhwa => {
                    const isHiatus = manhwa.Activitycountdown && (manhwa.Activitycountdown.toLowerCase() === "hiatus" || manhwa.Activitycountdown.toLowerCase() === "paused");
                    if (!isHiatus) {
                        processIndividualTimer(manhwa, 'kr', 'KRreleasedate', 'KRnewchapter');
                        processIndividualTimer(manhwa, 'en', 'ENreleaseDate', 'ENnewchapter');
                    }
                });
            }, 1000);
        }

        // Initialize!
        loadData();
    </script>
</body>
</html>
